<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Trade Customer Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 页面过渡遮罩 -->
    <div id="pageTransition" style="
        position: fixed; inset: 0; z-index: 99999;
        background: var(--color-slate-900);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
    "></div>

    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/" onclick="navigate(event, '/')">
                <i class="bi bi-graph-up-arrow fs-4"></i>
                <span class="fw-semibold">Trade Analyzer</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link{% if active_nav == 'index' %} active{% endif %}" href="/" onclick="navigate(event, '/')">
                            <i class="bi bi-people-fill me-1"></i>客户列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if active_nav == 'discovery' %} active{% endif %}" href="/discovery" onclick="navigate(event, '/discovery')">
                            <i class="bi bi-compass-fill me-1"></i>客户发现
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if active_nav == 'config' %} active{% endif %}" href="/config" onclick="navigate(event, '/config')">
                            <i class="bi bi-sliders2 me-1"></i>评分配置
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3" id="navStats">
                    {% block nav_stats %}{% endblock %}
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="app-main" id="appMain">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // ── 页面过渡动画 ──
        const transitionEl = document.getElementById('pageTransition');
        const mainEl = document.getElementById('appMain');

        function navigate(event, url) {
            if (event.ctrlKey || event.metaKey || event.shiftKey || event.button === 1) return;
            if (window.location.pathname === url) return;
            event.preventDefault();
            transitionEl.style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 200);
        }

        // 页面加载后淡入
        document.addEventListener('DOMContentLoaded', () => {
            if (transitionEl) {
                transitionEl.style.opacity = '1';
                requestAnimationFrame(() => {
                    transitionEl.style.transition = 'opacity 0.4s ease';
                    transitionEl.style.opacity = '0';
                    setTimeout(() => { transitionEl.style.transition = ''; }, 500);
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
