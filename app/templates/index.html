<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade Customer Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-robot me-2"></i>
                <span class="fw-bold">AI Trade Customer Analyzer V2.9</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-sm btn-outline-light me-2"><i class="bi bi-people"></i> 客户列表</a>
                <a href="/discovery" class="btn btn-sm btn-outline-light me-2"><i class="bi bi-search"></i> 客户发现</a>
                <a href="/config" class="btn btn-sm btn-outline-light me-2"><i class="bi bi-gear"></i> 评分配置</a>
                <span class="badge bg-light text-primary" id="statsBadge">
                    <i class="bi bi-database"></i> 加载中...
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">

        <!-- 统计数据 -->
        <div class="row mb-4" id="statsCards">
            <div class="col-md-3 col-6 mb-3">
                <div class="card border-0 shadow-sm stats-card">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">全部客户</h5>
                        <h2 class="mb-0 text-primary" id="statTotal">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="card border-0 shadow-sm stats-card">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">已分析</h5>
                        <h2 class="mb-0 text-success" id="statAnalyzed">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="card border-0 shadow-sm stats-card">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">Google发现</h5>
                        <h2 class="mb-0 text-info" id="statGoogle">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="card border-0 shadow-sm stats-card">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">A级客户</h5>
                        <h2 class="mb-0 text-danger" id="statGradeA">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-2 mb-2 mb-md-0">
                        <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#importModal">
                            <i class="bi bi-upload"></i> 导入Excel
                        </button>
                    </div>
                    <div class="col-md-2 mb-2 mb-md-0">
                        <button class="btn btn-success w-100" onclick="analyzeAll()" id="btnAnalyzeAll">
                            <i class="bi bi-lightning"></i> 批量分析
                        </button>
                    </div>
                    <div class="col-md-2 mb-2 mb-md-0">
                        <button class="btn btn-danger w-100" onclick="stopAnalysis()" id="btnStop">
                            <i class="bi bi-stop-circle"></i> 停止分析
                        </button>
                    </div>
                    <div class="col-md-3 mb-2 mb-md-0">
                        <a href="/api/export-excel" class="btn btn-info w-100 text-white">
                            <i class="bi bi-download"></i> 导出Excel
                        </a>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-secondary w-100" onclick="refreshData()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 分析状态提示 -->
        <div id="analysisStatusBar" class="d-none alert alert-warning d-flex justify-content-between align-items-center py-2 mb-3">
            <span><i class="bi bi-hourglass-split"></i> <span id="analysisStatusText">正在分析中...</span></span>
            <button class="btn btn-sm btn-outline-danger" onclick="stopAnalysis()"><i class="bi bi-stop-circle"></i> 停止</button>
        </div>

        <!-- 筛选栏 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索公司名称..." oninput="debouncedSearch()">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="countryFilter" onchange="loadCustomers()">
                            <option value="">所有国家</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="priorityFilter" onchange="loadCustomers()">
                            <option value="">所有优先级</option>
                            <option value="A">A级 (80-100)</option>
                            <option value="B">B级 (60-79)</option>
                            <option value="C">C级 (40-59)</option>
                            <option value="D">D级 (0-39)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="statusFilter" onchange="loadCustomers()">
                            <option value="">所有状态</option>
                            <option value="待联系">待联系</option>
                            <option value="已发邮件">已发邮件</option>
                            <option value="已回复">已回复</option>
                            <option value="无效线索">无效线索</option>
                            <option value="成单">成单</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="sortFilter" onchange="loadCustomers()">
                            <option value="desc">评分从高到低</option>
                            <option value="asc">评分从低到高</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 客户列表 -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-bold"><i class="bi bi-people"></i> 客户列表</span>
                <span class="badge bg-secondary" id="totalCount">0 个客户</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>公司名称</th>
                                <th style="min-width:100px">跟进状态</th>
                                <th>国家</th>
                                <th>评级</th>
                                <th>来源</th>
                                <th>邮箱</th>
                                <th>总分</th>
                                <th>优先级</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            <tr><td colspan="9" class="text-center text-muted py-5"><i class="bi bi-inbox" style="font-size: 2rem;"></i><br>暂无数据，请先导入Excel文件或使用客户发现功能</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal fade" id="importModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload"></i> 导入客户名单</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">支持的Excel格式：.xlsx / .xls</p>
                    <p class="text-muted small">表头需包含：Company Name / Website / Country</p>
                    <div class="mb-3"><input class="form-control" type="file" id="excelFile" accept=".xlsx,.xls"></div>
                    <div id="importProgress" class="d-none"><div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">正在导入...</div></div></div>
                    <div id="importResult" class="d-none"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button class="btn btn-primary" onclick="importExcel()">开始导入</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let searchTimer = null, statusPollTimer = null;

        // ──── 带超时的 fetch 封装（AbortController + timeout） ────
        async function _fetchWithTimeout(url, options = {}, timeout = 15000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const resp = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timer);
                return resp;
            } catch (err) {
                clearTimeout(timer);
                if (err.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw err;
            }
        }

        // ──── 安全转义（防止 HTML 注入） ────
        function _esc(str) {
            if (str === null || str === undefined) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        // ──── 安全的数字兜底 ────
        function _num(val, fallback = 0) {
            const n = Number(val);
            return Number.isFinite(n) ? n : fallback;
        }

        // ──── 安全的数组兜底 ────
        function _arr(val) {
            return Array.isArray(val) ? val : [];
        }

        // ──── 页面关闭/刷新时清理轮询 ────
        window.addEventListener('beforeunload', () => {
            if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
        });

        async function loadCustomers() {
            const search = document.getElementById('searchInput').value;
            const country = document.getElementById('countryFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortFilter').value;
            let url = `/api/customers?sort_by_score=${sort}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (country) url += `&country=${encodeURIComponent(country)}`;
            if (priority) url += `&priority=${encodeURIComponent(priority)}`;
            if (status) url += `&status=${encodeURIComponent(status)}`;
            try {
                const resp = await _fetchWithTimeout(url);
                const data = await resp.json();
                renderTable(data);
                document.getElementById('totalCount').textContent = `${data.total} 个客户`;
                const countrySelect = document.getElementById('countryFilter');
                const currentCountry = countrySelect.value;
                countrySelect.innerHTML = '<option value="">所有国家</option>';
                data.countries.forEach(c => { countrySelect.innerHTML += `<option value="${c}" ${c === currentCountry ? 'selected' : ''}>${c}</option>`; });
            } catch (err) { console.error('加载客户列表失败:', err); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('customerTableBody');
            if (!data.customers || data.customers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-5"><i class="bi bi-inbox" style="font-size: 2rem;"></i><br>暂无匹配的客户数据</td></tr>`;
                return;
            }
            const pBadge = { 'A': 'bg-danger', 'B': 'bg-warning text-dark', 'C': 'bg-info text-dark', 'D': 'bg-secondary' };
            const statusBadge = { '待联系': 'bg-secondary', '已发邮件': 'bg-primary', '已回复': 'bg-success', '无效线索': 'bg-dark', '成单': 'bg-warning text-dark' };
            // 抓取/分析状态图标
            function scrapeIcon(c) {
                if (c.scrape_status === 'success') return '<span class="badge bg-success" title="官网抓取成功">✅</span>';
                if (c.scrape_status === 'failed') return '<span class="badge bg-danger" title="官网抓取失败">❌</span>';
                if (c.scrape_status === 'partial') return '<span class="badge bg-warning text-dark" title="部分抓取">⚠️</span>';
                return '';
            }
            function aiIcon(c) {
                if (c.ai_status === 'success') return '<span class="badge bg-success" title="AI分析成功">🧠</span>';
                if (c.ai_status === 'failed') return '<span class="badge bg-danger" title="AI分析失败">💀</span>';
                if (c.ai_status === 'skipped') return '<span class="badge bg-secondary" title="已跳过">⏭️</span>';
                return '';
            }
            // 星星评级
            function stars(rating) {
                const n = Number(rating) || 0;
                let s = '';
                for (let i = 1; i <= 5; i++) {
                    s += i <= n ? '<i class="bi bi-star-fill text-warning"></i>' : '<i class="bi bi-star text-muted"></i>';
                }
                return s;
            }
            let html = '';
            data.customers.forEach(c => {
                const bc = pBadge[c.priority] || 'bg-secondary';
                const sc = c.total_score >= 80 ? 'text-danger' : c.total_score >= 60 ? 'text-warning' : c.total_score >= 40 ? 'text-info' : 'text-muted';
                const statusCls = statusBadge[c.status] || 'bg-secondary';
                const statusLabel = c.status || '待联系';
                const followDate = c.follow_up_date ? `<br><small class="text-muted">📅 ${_esc(c.follow_up_date)}</small>` : '';
                const failTip = c.fail_reason ? ` title="${_esc(c.fail_reason)}"` : '';
                sourceIcon = c.discovery_source === 'Google' ? '<span class="badge bg-info"><i class="bi bi-google"></i> Google</span>' : '<span class="badge bg-secondary"><i class="bi bi-upload"></i> 导入</span>';
                html += `<tr>
                    <td><a href="/customer/${c.id}" target="_blank" class="text-decoration-none fw-medium">${_esc(c.company_name)}</a></td>
                    <td><span class="badge ${statusCls}">${_esc(statusLabel)}</span>${followDate}</td>
                    <td><span class="badge bg-light text-dark">${_esc(c.country) || '-'}</span></td>
                    <td class="small" style="white-space:nowrap">${stars(c.star_rating)}</td>
                    <td>${sourceIcon} ${scrapeIcon(c)} ${aiIcon(c)}</td>
                    <td><span class="badge bg-secondary">${c.email_count}</span></td>
                    <td class="${sc} fw-bold">${c.total_score ?? '-'}</td>
                    <td><span class="badge ${bc}">${c.priority || '-'}</span></td>
                    <td><div class="btn-group btn-group-sm">
                        <a href="/customer/${c.id}" target="_blank" class="btn btn-outline-primary" title="查看详情"><i class="bi bi-eye"></i></a>
                        <button class="btn btn-outline-success" onclick="analyzeSingle(${c.id})" title="分析"><i class="bi bi-lightning"></i></button>
                        <button class="btn btn-outline-warning" onclick="rescrapeCustomer(${c.id})" title="重新抓取"><i class="bi bi-arrow-clockwise"></i></button>
                        <button class="btn btn-outline-info" onclick="reanalyzeCustomer(${c.id})" title="重新AI分析"><i class="bi bi-robot"></i></button>
                        <button class="btn btn-outline-danger" onclick="deleteCustomer(${c.id})" title="删除"><i class="bi bi-trash"></i></button>
                    </div></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function loadStats() {
            try {
                const resp = await _fetchWithTimeout('/api/stats');
                const s = await resp.json();
                document.getElementById('statTotal').textContent = s.total;
                document.getElementById('statAnalyzed').textContent = s.analyzed;
                document.getElementById('statGoogle').textContent = s.discovery_stats?.google || 0;
                document.getElementById('statGradeA').textContent = s.priority_distribution?.A || 0;
                document.getElementById('statsBadge').innerHTML = `<i class="bi bi-database"></i> ${s.total} 客户 | ${s.analyzed} 已分析`;
            } catch (err) { console.error('加载统计数据失败:', err); }
        }

        async function importExcel() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) { alert('请选择Excel文件'); return; }
            const progress = document.getElementById('importProgress');
            const result = document.getElementById('importResult');
            progress.classList.remove('d-none'); result.classList.add('d-none');
            try {
                const fd = new FormData(); fd.append('file', file);
                const resp = await _fetchWithTimeout('/api/import-excel', { method: 'POST', body: fd }, 30000);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '导入失败');
                result.className = 'alert alert-success mt-3';
                result.innerHTML = `<i class="bi bi-check-circle"></i> ${data.message}<br><small>文件中 ${data.total_in_file} 条，成功导入 ${data.imported} 条</small>`;
                result.classList.remove('d-none'); loadCustomers(); loadStats();
            } catch (err) {
                result.className = 'alert alert-danger mt-3';
                result.innerHTML = `<i class="bi bi-exclamation-triangle"></i> ${err.message}`;
                result.classList.remove('d-none');
            } finally { progress.classList.add('d-none'); }
        }

        async function analyzeSingle(id) {
            if (!confirm('确定要分析该客户吗？')) return;
            try {
                const resp = await _fetchWithTimeout(`/api/analyze/${id}`, { method: 'POST' }, 120000);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '分析失败');
                loadCustomers(); loadStats(); alert('分析完成');
            } catch (err) { alert('分析失败: ' + err.message); }
        }

        async function analyzeAll() {
            if (!confirm('确定要分析所有未分析的客户吗？')) return;
            const btn = document.getElementById('btnAnalyzeAll');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 分析中...';
            showAnalysisStatus('批量分析进行中...');
            try {
                const resp = await _fetchWithTimeout('/api/analyze-all', { method: 'POST' }, 600000);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '批量分析失败');
                loadCustomers(); loadStats(); alert(`批量分析完成！共分析 ${data.analyzed_count} 个客户`);
            } catch (err) { alert('批量分析失败: ' + err.message);
            } finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-lightning"></i> 批量分析'; hideAnalysisStatus(); }
        }

        async function stopAnalysis() {
            try {
                await _fetchWithTimeout('/api/stop-analysis', { method: 'POST' });
                document.getElementById('analysisStatusText').textContent = '正在停止...';
                setTimeout(() => { hideAnalysisStatus(); loadCustomers(); }, 2000);
            } catch (err) { console.error('停止分析失败:', err); }
        }

        function showAnalysisStatus(text) {
            document.getElementById('analysisStatusText').textContent = text;
            document.getElementById('analysisStatusBar').classList.remove('d-none');
            if (statusPollTimer) clearInterval(statusPollTimer);
            statusPollTimer = setInterval(pollStatus, 2000);
        }

        function hideAnalysisStatus() {
            document.getElementById('analysisStatusBar').classList.add('d-none');
            if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
        }

        async function pollStatus() {
            try {
                const resp = await _fetchWithTimeout('/api/analysis-status');
                const s = await resp.json();
                if (!s.is_analyzing) { hideAnalysisStatus(); loadCustomers(); loadStats(); }
                else { document.getElementById('analysisStatusText').textContent = '正在分析中...'; }
            } catch (err) { console.error('轮询状态失败:', err); }
        }

        async function deleteCustomer(id) {
            if (!confirm('确定要删除吗？')) return;
            try {
                const resp = await _fetchWithTimeout(`/api/customers/${id}`, { method: 'DELETE' });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '删除失败');
                loadCustomers(); loadStats();
            } catch (err) { alert('删除失败: ' + err.message); }
        }

        function debouncedSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { loadCustomers(); }, 400); }
        function refreshData() { loadCustomers(); loadStats(); }

        // ── 重新抓取 ──
        async function rescrapeCustomer(id) {
            if (!confirm('确定要重新抓取该客户的官网吗？')) return;
            try {
                const resp = await _fetchWithTimeout(`/api/customers/${id}/re-scrape`, { method: 'POST' }, 60000);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '重新抓取失败');
                loadCustomers(); loadStats(); alert('重新抓取完成');
            } catch (err) { alert('重新抓取失败: ' + err.message); }
        }

        // ── 重新AI分析 ──
        async function reanalyzeCustomer(id) {
            if (!confirm('确定要重新AI分析该客户吗？')) return;
            try {
                const resp = await _fetchWithTimeout(`/api/customers/${id}/re-analyze`, { method: 'POST' }, 120000);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '重新分析失败');
                loadCustomers(); loadStats(); alert('重新分析完成');
            } catch (err) { alert('重新分析失败: ' + err.message); }
        }

        document.addEventListener('DOMContentLoaded', () => { loadCustomers(); loadStats(); });
    </script>

</body>
</html>
